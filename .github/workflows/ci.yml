name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: fmt + lint + check + test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with: { deno-version: v2.x }

      - name: Format check
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Type check
        run: deno task check

      - name: Test
        run: deno task test
